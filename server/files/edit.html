<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit</title>
    <link rel="stylesheet" href="edit.css"/>


    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
            integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
            integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
            crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
            integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
            crossorigin="anonymous"></script>
    <link rel="stylesheet" href="edit.css"/>

</head>

<body>

<div class="page-wrapper">
    <form class="movie-form">
        <h2 class="form-title">Add Movie</h2>

        <div class="form-group">
            <label for="movieTitle">Title</label>
            <input type="text" id="movieTitle" placeholder="e.g. Inception" required>
        </div>

        <div class="form-row compact-row">
            <div class="form-group small">
                <label for="movieReleaseYear">Year</label>
                <input type="number" id="movieReleaseYear">
            </div>

            <div class="form-group small">
                <label for="movieRating">Rating</label>
                <select id="movieRating"></select>
            </div>

            <div class="form-group small">
                <label for="movieReleaseDate">Date</label>
                <input type="date" id="movieReleaseDate">
            </div>

            <div class="form-group small">
                <label for="movieRuntime">Min</label>
                <input type="number" id="movieRuntime">
            </div>
        </div>

        <div class="form-group">
            <label>Genres</label>
            <div id="movieGenre" class="checkbox-grid">
                <label><input type="checkbox" value="Action"> Action</label>
                <label><input type="checkbox" value="Adventure"> Adventure</label>
                <label><input type="checkbox" value="Animation"> Animation</label>
                <label><input type="checkbox" value="Biography"> Biography</label>
                <label><input type="checkbox" value="Comedy"> Comedy</label>
                <label><input type="checkbox" value="Crime"> Crime</label>
                <label><input type="checkbox" value="Documentary"> Documentary</label>
                <label><input type="checkbox" value="Drama"> Drama</label>
                <label><input type="checkbox" value="Family"> Family</label>
                <label><input type="checkbox" value="Fantasy"> Fantasy</label>
                <label><input type="checkbox" value="Film Noir"> Film Noir</label>
                <label><input type="checkbox" value="History"> History</label>
                <label><input type="checkbox" value="Horror"> Horror</label>
                <label><input type="checkbox" value="Music"> Music</label>
                <label><input type="checkbox" value="Musical"> Musical</label>
                <label><input type="checkbox" value="Mystery"> Mystery</label>
                <label><input type="checkbox" value="Romance"> Romance</label>
                <label><input type="checkbox" value="Sci-Fi"> Sci-Fi</label>
                <label><input type="checkbox" value="Short Film"> Short Film</label>
                <label><input type="checkbox" value="Sport"> Sport</label>
                <label><input type="checkbox" value="Superhero"> Superhero</label>
                <label><input type="checkbox" value="Thriller"> Thriller</label>
                <label><input type="checkbox" value="War"> War</label>
                <label><input type="checkbox" value="Western"> Western</label>
            </div>
        </div>

        <div class="form-group">
            <label>Directors</label>
            <div id="directorsContainer"></div>
            <button type="button" class="add-btn" onclick="addDirector()">+ Add Director</button>
        </div>

        <div class="form-group">
            <label>Actors</label>
            <div id="actorsContainer"></div>
            <button type="button" class="add-btn" onclick="addActor()">+ Add Actor</button>
        </div>

        <div class="form-group">
            <label>Writers</label>
            <div id="writersContainer"></div>
            <button type="button" class="add-btn" onclick="addWriter()">+ Add Writer</button>
        </div>

        <div class="form-group">
            <label for="moviePlot">Plot</label>
            <textarea id="moviePlot" rows="4"></textarea>
        </div>

        <div class="form-group">
            <label for="moviePoster">Poster URL</label>
            <input type="url" id="moviePoster" placeholder="https://...">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="movieMetascore">Metascore</label>
                <input type="number" id="movieMetascore" min="1" max="100">
            </div>

            <div class="form-group">
                <label for="movieImdbRating">IMDb Rating</label>
                <input type="number" id="movieImdbRating" min="1" max="10" step="0.1">
            </div>
        </div>

        <div class="form-group" style="display: none">
            <label for="movieimdbID">IMDb ID</label>
            <input type="text" id="movieimdbID">
        </div>

        <div class="form-actions">
            <button type="button" class="btn-main" onclick="putMovie()">Save</button>
            <a href="index.html" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-box">
        <h3 id="modalTitle"></h3>
        <p id="modalMessage"></p>
        <button class="btn-main" onclick="closeModal()">OK</button>
    </div>
</div>

<script src="edit.js"></script>

</body>
</html>
